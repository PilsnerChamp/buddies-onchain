<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Buddies Onchain — OG card (@@ face, v4 with ~ brow)</title>
  <desc>1200x630 social preview. Single-row ASCII face {@,@} on deep surface with a tilde brow over the left eye. Minimalist composition; no chrome, no tagline. Hand-authored SVG; PNG derived via Chromium headless rasterize. Font: DejaVu Sans Mono (sprite) WOFF2 subset base64-embedded (now includes ~). Accent #d397f6, surface #0a0818.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      @font-face {
        font-family: 'DejaVuMono';
        src: url('data:font/woff2;base64,') format('woff2');
        font-weight: 700;
        font-style: normal;
      }
      .face { font-family: 'DejaVuMono', ui-monospace, Menlo, Consolas, monospace; font-weight: 700; font-size: 128px; fill: #d397f6; }
      .brow { font-family: 'DejaVuMono', ui-monospace, Menlo, Consolas, monospace; font-weight: 700; font-size: 96px; fill: #d397f6; }
    ]]></style>
  </defs>

  <!-- surface -->
  <rect width="1200" height="630" fill="#0a0818"/>

  <!-- ASCII face: single row {@,@}; baseline tuned for optical center on canvas. Brow `~` placed over left eye (left-@ center x ≈ 523 at 128px). -->
  <g id="face" text-anchor="middle">
    <text class="brow" x="523" y="270">~</text>
    <text class="face" x="600" y="358">{@,@}</text>
  </g>
</svg>
