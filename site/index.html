<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Static meta tags + favicons + OG/Twitter cards. Default /og-home.png is
      the terminal variant; /og-home-icon.png is an alternate pinning target.
      The icon variant ({@,@}~ face) doubles as the favicon source. Absolute
      URLs are hardcoded to https://buddies-onchain.xyz/;
      preview deploys do not rewrite static meta.
    -->
    <title>buddies-onchain.xyz</title>
    <meta name="description" content="One account. One buddy. Lives on-chain. No host. No takedown." />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0a0818" />
    <meta name="robots" content="index, follow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="canonical" href="https://buddies-onchain.xyz/" />
    <meta property="og:title" content="buddies-onchain.xyz" />
    <meta property="og:description" content="One account. One buddy. Lives on-chain. No host. No takedown." />
    <meta property="og:url" content="https://buddies-onchain.xyz/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://buddies-onchain.xyz/og-home.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="BUDDIES·ONCHAIN·XYZ terminal frame with {@,@} ASCII face. One account. One buddy. Lives on-chain. No host. No takedown." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://buddies-onchain.xyz/og-home.png" />
    <meta name="twitter:image:alt" content="BUDDIES·ONCHAIN·XYZ terminal frame with {@,@} ASCII face. One account. One buddy. Lives on-chain. No host. No takedown." />
  </head>
