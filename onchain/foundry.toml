[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

# OpenZeppelin Contracts v5.x is now the canonical dependency surface.
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Allow tests to read cross-domain JSON fixtures, and SeedAnvil.s.sol to
# read the post-deploy address artifact written by extract-deployment.sh.
fs_permissions = [
    { access = "read", path = "test/vectors" },
    { access = "read", path = "contract-data/fonts/chrome" },
    { access = "read", path = "contract-data/fonts/sprite" },
    { access = "read", path = "deployments" },
    { access = "read", path = "contract-data/hatch-coverage" },
]

[lint]
# unsafe-cheatcode: vm.readFile is intentional in tests for JSON vectors / font manifests; no production usage exists.
# asm-keccak256: keccak256 sites are EIP-712 hashing and identity-hash derivation — readability and audit clarity outweigh ~20-50 gas savings from inline assembly.
exclude_lints = ["unsafe-cheatcode", "asm-keccak256"]
